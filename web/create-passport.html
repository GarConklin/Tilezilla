<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3d3a" />
  <title>Tilezilla — Create Passport</title>
  <link rel="stylesheet" href="css/auth-screen.css" />
</head>
<body class="auth-screen auth-screen--create">
  <main class="auth-screen__stage" id="createStage">
    <img
      class="auth-screen__art"
      src="/img/Create-Passport.png"
      alt="Issue new passport"
      width="1418"
      height="2200"
      draggable="false"
    />
    <form class="auth-screen__form auth-screen__form--create" id="createForm">
      <label class="auth-screen__sr" for="createName">Explorer name</label>
      <input class="auth-screen__input auth-screen__input--name" id="createName" name="name" autocomplete="username" />
      <label class="auth-screen__sr" for="createEmail">Passport email</label>
      <input class="auth-screen__input auth-screen__input--email" id="createEmail" name="email" type="email" autocomplete="email" />
      <label class="auth-screen__sr" for="createPass">Secret passphrase</label>
      <input class="auth-screen__input auth-screen__input--pass" id="createPass" name="pass" type="password" autocomplete="new-password" />
      <label class="auth-screen__sr" for="createPass2">Confirm passphrase</label>
      <input class="auth-screen__input auth-screen__input--pass2" id="createPass2" name="pass2" type="password" autocomplete="new-password" />
      <button type="submit" class="auth-screen__hit auth-screen__hit--submit" aria-label="Issue passport"></button>
    </form>
    <a class="auth-screen__hit auth-screen__hit--secondary" href="/login-screen.html" aria-label="I already have a passport"></a>
    <nav class="auth-screen__bottom-nav" aria-label="Shortcuts">
      <a class="auth-screen__hit auth-screen__hit--nav-daily" href="/tilezilla.html" id="authNavDaily" aria-label="Daily Challenge"></a>
      <button type="button" class="auth-screen__hit auth-screen__hit--nav-logout" id="authNavLogout" aria-label="Log out"></button>
    </nav>
  </main>

  <div class="auth-error-root" id="authErrorRoot" hidden>
    <button type="button" class="auth-error-root__backdrop" id="authErrorBackdrop" aria-label="Close"></button>
    <div class="auth-error-dialog" role="alertdialog" aria-modal="true" aria-labelledby="authErrorMessage">
      <div class="auth-error-dialog__frame">
        <img
          class="auth-error-dialog__art"
          src="/img/login-Erros-PlaqueBase.png"
          alt=""
          width="1267"
          height="1022"
        />
        <p class="auth-error__message" id="authErrorMessage"></p>
        <button type="button" class="auth-screen__hit auth-error__hit--ok" id="authErrorOkBtn" aria-label="OK"></button>
        <button type="button" class="auth-screen__hit auth-error__hit--close" id="authErrorCloseBtn" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/auth-screen-init.js"></script>
  <script type="module">
    import {
      ACTIVE_USER_KEY,
      AUTH_MODE_KEY,
      setRegisteredUser,
      trackGuestEvent,
      getGuestCode,
    } from './js/tilezilla-guest.js';
    import { initAuthErrorPopup, showAuthErrorPopup } from './js/auth-error-popup.js';
    import { initAuthScreenNav } from './js/auth-screen-nav.js';

    initAuthErrorPopup();
    initAuthScreenNav({ source: 'create_passport' });

    const form = document.getElementById('createForm');

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('createName')?.value?.trim();
      const email = document.getElementById('createEmail')?.value?.trim();
      const pass = document.getElementById('createPass')?.value || '';
      const pass2 = document.getElementById('createPass2')?.value || '';
      if (!name || !email || !pass) {
        showAuthErrorPopup('Fill in all passport fields.');
        return;
      }
      if (pass !== pass2) {
        showAuthErrorPopup('Passphrases do not match.');
        return;
      }

      try {
        const res = await fetch('/auth/api/register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            username: name,
            email,
            password: pass,
            guest_code: getGuestCode() || null,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data?.success) {
          showAuthErrorPopup(data?.error || 'Could not create passport.');
          return;
        }
        const userId = data.user?.username || name;
        setRegisteredUser(userId);
        localStorage.setItem(ACTIVE_USER_KEY, userId);
        localStorage.setItem(AUTH_MODE_KEY, 'registered');
        trackGuestEvent('Account Created', { user_id: userId, converted_from: getGuestCode() });
        window.location.href = '/profile-screen.html';
      } catch {
        setRegisteredUser(name);
        localStorage.setItem(ACTIVE_USER_KEY, name);
        localStorage.setItem(AUTH_MODE_KEY, 'registered');
        window.location.href = '/profile-screen.html';
      }
    });
  </script>
</body>
</html>
