<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3d3a" />
  <title>Tilezilla</title>
  <link rel="stylesheet" href="css/tilezilla-shell.css" />
</head>
<body>
  <div class="tz-app" data-screen="load">

    <div class="tz-bg" aria-hidden="true">
      <div class="tz-bg__sky"></div>
      <div class="tz-bg__water">
        <div class="tz-bg__water-layer tz-bg__water-layer--a"></div>
        <div class="tz-bg__water-layer tz-bg__water-layer--b"></div>
      </div>
    </div>

    <div class="tz-stage tz-ui-layer">
      <div class="tz-shell tz-shell--load">
        <section class="tz-load-screen" id="loadScreen" aria-label="Welcome to Tilezilla">
          <img
            class="tz-load-screen__art"
            src="/img/Load-Screen.png"
            alt=""
            width="1024"
            height="1536"
            draggable="false"
          />
          <button type="button" class="tz-load-screen__hit tz-load-screen__hit--guest" id="playGuestBtn" aria-label="Play as guest">
            <img src="/img/PlayAsGuest.png" alt="" />
          </button>
          <button type="button" class="tz-load-screen__hit tz-load-screen__hit--login" id="loginBtn" aria-label="Login">
            <img src="/img/LogIn.png" alt="" />
          </button>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="js/tilezilla-load.js"></script>
</body>
</html>
