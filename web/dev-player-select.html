<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3d3a" />
  <title>Tilezilla — Choose test player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #f4ecd8;
      background: #1a3d3a url("/img/Background lake and dock.png") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .panel {
      width: min(100%, 360px);
      padding: 28px 24px 24px;
      border-radius: 20px;
      background: rgba(15, 42, 38, 0.92);
      border: 2px solid rgba(196, 163, 90, 0.45);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .panel img.logo {
      width: min(240px, 80vw);
      height: auto;
      margin: 0 auto 8px;
      display: block;
    }

    .panel h1 {
      margin: 0 0 4px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .panel p.sub {
      margin: 0 0 20px;
      font-size: 0.85rem;
      opacity: 0.75;
    }

    .panel p.dev-tag {
      margin: 0 0 16px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #c4a35a;
      opacity: 0.9;
    }

    .players {
      display: grid;
      gap: 12px;
    }

    .player-card {
      display: grid;
      gap: 6px;
    }

    button.player {
      appearance: none;
      border: 2px solid rgba(196, 163, 90, 0.35);
      border-radius: 14px;
      background: rgba(45, 90, 61, 0.55);
      color: inherit;
      padding: 16px 18px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    button.player:hover,
    button.player:focus-visible {
      border-color: #c4a35a;
      background: rgba(45, 90, 61, 0.85);
      outline: none;
    }

    button.player:active {
      transform: scale(0.98);
    }

    button.player .name {
      display: block;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    button.player .meta {
      display: block;
      font-size: 0.82rem;
      opacity: 0.8;
      line-height: 1.35;
    }

    button.player-reset {
      appearance: none;
      border: 1px solid rgba(196, 163, 90, 0.25);
      border-radius: 8px;
      background: transparent;
      color: #a8b8b4;
      padding: 6px 10px;
      font: inherit;
      font-size: 0.72rem;
      cursor: pointer;
    }

    button.player-reset:hover,
    button.player-reset:focus-visible {
      border-color: #e8b923;
      color: #f4ecd8;
      outline: none;
    }

    .status {
      margin: 12px 0 0;
      min-height: 1.2em;
      font-size: 0.78rem;
      color: #8fd49a;
    }

    .foot {
      margin-top: 18px;
      font-size: 0.75rem;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <main class="panel" aria-labelledby="pick-title">
    <img class="logo" src="/img/Title.png" width="240" height="48" alt="Tilezilla" />
    <p class="dev-tag">Dev test players</p>
    <h1 id="pick-title">Who is playing?</h1>
    <p class="sub">Temporary picker — remove before production.</p>

    <div class="players">
      <div class="player-card">
        <button type="button" class="player" data-user="dev">
          <span class="name">Dev</span>
          <span class="meta">QA account · dev menu · browse known solutions · load board · 99 hint tokens</span>
        </button>
        <button type="button" class="player-reset" data-reset-user="dev">Reset Dev progress</button>
      </div>
      <div class="player-card">
        <button type="button" class="player" data-user="gar">
          <span class="name">Gar</span>
          <span class="meta">Newbie · Adventure L1-1 · 5 hint tokens · fresh progress</span>
        </button>
        <button type="button" class="player-reset" data-reset-user="gar">Reset Gar progress</button>
      </div>
      <div class="player-card">
        <button type="button" class="player" data-user="Arn">
          <span class="name">Arn</span>
          <span class="meta">Adventure L4-1 · 1,141 puzzles cleared through L3-10</span>
        </button>
        <button type="button" class="player-reset" data-reset-user="Arn">Reset Arn progress</button>
      </div>
    </div>

    <p class="status" id="status" role="status" aria-live="polite"></p>

    <p class="foot">
      Progress is saved separately per player in this browser.
      <a href="/rank-sublevel-tuner.html" style="color:#8fd49a">Rank sublevel tuner</a>
      · <a href="/rank-badge-preview.html" style="color:#8fd49a">Badge preview</a>
      · <a href="/discovery-record-tuner.html" style="color:#8fd49a">Discovery record tuner</a>
      · <a href="/menu-tuner.html" style="color:#8fd49a">Menu tuner</a>
      · <a href="/bottom-nav-tuner.html" style="color:#8fd49a">Bottom nav tuner</a>
      · <a href="/preview-tuner.html" style="color:#8fd49a">Preview tuner</a>
      · <a href="/stuck-reveal-tuner.html" style="color:#8fd49a">Stuck reveal tuner</a>
    </p>
  </main>

  <script type="module">
    import { resetDevPlayerProgress } from './js/dev-player-reset.js';

    const STORAGE_KEY = 'snake_active_user_v1';
    const PLAY_URL = '/tilezilla.html';
    const statusEl = document.getElementById('status');

    document.querySelectorAll('button.player').forEach((btn) => {
      btn.addEventListener('click', () => {
        const user = btn.dataset.user;
        if (!user) return;
        localStorage.setItem(STORAGE_KEY, user);
        window.location.href = PLAY_URL;
      });
    });

    document.querySelectorAll('button.player-reset').forEach((btn) => {
      btn.addEventListener('click', () => {
        const user = btn.dataset.resetUser;
        if (!user) return;
        const label = user === 'gar' ? 'Gar' : user === 'dev' ? 'Dev' : user;
        if (!confirm(`Reset all saved puzzle progress for ${label} in this browser?\n\nThis clears found solutions and best times so you can see the discovery popup again.`)) {
          return;
        }
        const { removedKeys, hintTokens } = resetDevPlayerProgress(user);
        statusEl.textContent = `${label} reset — ${removedKeys.length} item(s) cleared · ${hintTokens} hint tokens restored`;
      });
    });
  </script>
</body>
</html>
