<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3d3a" />
  <title>Tilezilla — Login</title>
  <link rel="stylesheet" href="css/auth-screen.css" />
  <link rel="stylesheet" href="css/profile-passport-layout.css" />
</head>
<body class="auth-screen auth-screen--login auth-screen-chrome">
  <div class="auth-screen__bg tz-bg" aria-hidden="true">
    <div class="tz-bg__sky"></div>
    <div class="tz-bg__water">
      <div class="tz-bg__water-layer tz-bg__water-layer--a"></div>
      <div class="tz-bg__water-layer tz-bg__water-layer--b"></div>
    </div>
  </div>
  <div class="auth-screen__viewport">
    <img
      class="auth-screen__title"
      src="/img/Title.png"
      alt="Tilezilla — Skiff Lake Games"
      width="400"
      height="80"
      draggable="false"
    />
    <main class="auth-screen__stage" id="loginStage">
      <img
        class="auth-screen__art"
        src="/img/Logging-in.png"
        alt="Explorer's Passport — login"
        width="1418"
        height="2200"
        draggable="false"
      />
      <p class="auth-screen__profile-stat" data-profile-slot="explorersRegistered">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="totalAdventurePuzzles">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="totalKnownRoutes">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="largestSolution">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="todaysChallenge">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="recentPuzzleSolved">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="recentDailyCompleted">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="mostSolvedPuzzle">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="latestDiscovery">—</p>
      <p class="auth-screen__profile-stat" data-profile-slot="totalPlayTime">—</p>
      <form class="auth-screen__form auth-screen__form--login" id="loginForm">
        <label class="auth-screen__sr" for="loginUser">Explorer name or email</label>
        <input class="auth-screen__input auth-screen__input--user" id="loginUser" name="user" autocomplete="username" />
        <label class="auth-screen__sr" for="loginPass">Secret passphrase</label>
        <input class="auth-screen__input auth-screen__input--pass" id="loginPass" name="pass" type="password" autocomplete="current-password" />
        <button type="button" class="auth-screen__hit auth-screen__hit--pass-reveal" data-pass-reveal-for="loginPass" aria-label="Show passphrase" aria-pressed="false"></button>
        <button type="submit" class="auth-screen__hit auth-screen__hit--submit" aria-label="Open passport"></button>
      </form>
      <a class="auth-screen__hit auth-screen__hit--secondary" href="/create-passport.html" aria-label="Issue new passport"></a>
      <nav class="auth-screen__bottom-nav" aria-label="Shortcuts">
        <a class="auth-screen__hit auth-screen__hit--nav-daily" href="/tilezilla-v2.html" id="authNavDaily" aria-label="Daily Challenge"></a>
        <button type="button" class="auth-screen__hit auth-screen__hit--nav-logout" id="authNavLogout" aria-label="Log out"></button>
      </nav>
    </main>
  </div>

  <div class="auth-error-root" id="authErrorRoot" hidden>
    <button type="button" class="auth-error-root__backdrop" id="authErrorBackdrop" aria-label="Close"></button>
    <div class="auth-error-dialog" role="alertdialog" aria-modal="true" aria-labelledby="authErrorMessage">
      <div class="auth-error-dialog__frame">
        <img
          class="auth-error-dialog__art"
          src="/img/login-Erros-PlaqueBase.png"
          alt=""
          width="1267"
          height="1022"
        />
        <p class="auth-error__message" id="authErrorMessage"></p>
        <button type="button" class="auth-screen__hit auth-error__hit--ok" id="authErrorOkBtn" aria-label="OK"></button>
        <button type="button" class="auth-screen__hit auth-error__hit--close" id="authErrorCloseBtn" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/auth-screen-init.js"></script>
  <script type="module">
    import { getGuestCode } from './js/tilezilla-guest.js';
    import { completeLoginFromServer, loginReturnUrl } from './js/tilezilla-auth.js';
    import { initAuthErrorPopup, showAuthErrorPopup } from './js/auth-error-popup.js';
    import { initAuthScreenNav } from './js/auth-screen-nav.js';

    initAuthErrorPopup();
    initAuthScreenNav({ source: 'login_screen' });

    const form = document.getElementById('loginForm');

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('loginUser')?.value?.trim();
      const pass = document.getElementById('loginPass')?.value || '';
      if (!user || !pass) {
        showAuthErrorPopup('Enter your explorer name and passphrase.');
        return;
      }

      try {
        const res = await fetch('/auth/api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username: user, password: pass, guest_code: getGuestCode() || null }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data?.success) {
          showAuthErrorPopup(data?.error || 'Login failed. Check your credentials.');
          return;
        }
        await completeLoginFromServer(data, { source: 'login_screen' });
        window.location.href = loginReturnUrl('/profile-screen.html');
      } catch {
        showAuthErrorPopup('Could not reach the passport office. Check your connection and try again.');
      }
    });
  </script>
</body>
</html>
