<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3d3a" />
  <title>Tilezilla — Dev auto login</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      color: #f4ecd8;
      background: #1a3d3a;
    }
    .panel { text-align: center; padding: 24px; max-width: 22rem; }
    .panel h1 { font-size: 1rem; margin: 0 0 8px; font-weight: 600; }
    .panel p { margin: 0; opacity: 0.8; font-size: 0.9rem; line-height: 1.45; }
    .panel p.err { color: #ffb4b4; margin-top: 12px; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Signing in as test…</h1>
    <p id="status">Opening Tilezilla v2</p>
    <p class="err" id="error" hidden></p>
  </main>
  <script type="module">
    import { devAutoLogin } from './js/dev-auto-login.js';

    const params = new URLSearchParams(window.location.search);
    const username = params.get('user') || 'test';
    const password = params.get('pass') || 'test';
    const redirect = params.get('next') || '/tilezilla-v2.html';

    devAutoLogin({ username, password, redirect }).catch((err) => {
      const errorEl = document.getElementById('error');
      const statusEl = document.getElementById('status');
      if (statusEl) statusEl.textContent = 'Auto login failed';
      if (errorEl) {
        errorEl.hidden = false;
        errorEl.textContent = err?.message || String(err);
      }
    });
  </script>
</body>
</html>
