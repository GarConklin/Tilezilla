# Production gateway — tile.skifflakegames.com
# TLS terminates on the host (nginx). This container listens on :80 inside Docker.

upstream tilezilla_web {
    server web:8080;
}

upstream tilezilla_auth {
    server php-auth:80;
}

server {
    listen 80;
    server_name tile.skifflakegames.com;

    client_max_body_size 4m;

    location /auth/ {
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass http://tilezilla_auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /img/ {
        root /app;
        try_files $uri @img_stuff;
        add_header Cache-Control "public, max-age=86400";
    }

    location @img_stuff {
        internal;
        rewrite ^/img/(.*)$ /img/Stuff/$1 break;
        root /app;
        try_files $uri @img_web;
    }

    location @img_web {
        internal;
        rewrite ^/img/(.*)$ /web/img/$1 break;
        root /app;
        try_files $uri @python_web;
    }

    location /js/ {
        root /app/web;
        try_files $uri @python_web;
        add_header Cache-Control "no-store";
    }

    location /css/ {
        root /app/web;
        try_files $uri @python_web;
        add_header Cache-Control "no-store";
    }

    location /audio/ {
        root /app;
        try_files $uri @python_web;
        add_header Cache-Control "public, max-age=86400";
    }

    location /fonts/ {
        root /app/web;
        try_files $uri @python_web;
        add_header Cache-Control "no-store";
    }

    location @python_web {
        proxy_pass http://tilezilla_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }

    location / {
        proxy_pass http://tilezilla_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }
}
