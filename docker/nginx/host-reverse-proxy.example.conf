# Host nginx — copy to /etc/nginx/sites-available/tile.skifflakegames.com
# Tilezilla Docker gateway listens on 127.0.0.1:3000 (see docker-compose.production.yml).
#
#   sudo cp docker/nginx/host-reverse-proxy.example.conf /etc/nginx/sites-available/tile.skifflakegames.com
#   sudo ln -sf /etc/nginx/sites-available/tile.skifflakegames.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (first time):
#   sudo certbot --nginx -d tile.skifflakegames.com

upstream tilezilla_gateway {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name tile.skifflakegames.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tile.skifflakegames.com;

    # certbot --nginx fills these paths (or set manually).
    ssl_certificate     /etc/letsencrypt/live/tile.skifflakegames.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tile.skifflakegames.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 4m;

    location / {
        proxy_pass http://tilezilla_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }
}
