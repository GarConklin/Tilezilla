# Single entry point for remote / LAN testing.
# Routes game (Python) and auth (PHP) on one port.

upstream tilezilla_web {
    server web:8080;
}

upstream tilezilla_auth {
    server php-auth:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 4m;

    # Auth API + legacy auth public pages
    location /auth/ {
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass http://tilezilla_auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Game dev server (static, APIs, tuners)
    location / {
        proxy_pass http://tilezilla_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
