# Single entry point for remote / LAN testing.
# Routes game (Python) and auth (PHP) on one port.

upstream tilezilla_web {
    server web:8080;
}

upstream tilezilla_auth {
    server php-auth:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 4m;

    # Auth API + legacy auth public pages
    location /auth/ {
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass http://tilezilla_auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — served directly so Python isn't hit by 60+ parallel /img/ requests.
    location /img/ {
        root /app;
        try_files $uri @img_stuff;
        add_header Cache-Control "no-store";
    }

    location @img_stuff {
        internal;
        rewrite ^/img/(.*)$ /img/Stuff/$1 break;
        root /app;
        try_files $uri @img_web;
    }

    location @img_web {
        internal;
        rewrite ^/img/(.*)$ /web/img/$1 break;
        root /app;
        try_files $uri @python_web;
    }

    location /js/ {
        root /app/web;
        try_files $uri @python_web;
        add_header Cache-Control "no-store";
    }

    location /css/ {
        root /app/web;
        try_files $uri @python_web;
        add_header Cache-Control "no-store";
    }

    location /fonts/ {
        root /app/web;
        try_files $uri @python_web;
        add_header Cache-Control "no-store";
    }

    location @python_web {
        proxy_pass http://tilezilla_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }

    # Game dev server (APIs, tuners, HTML)
    location / {
        proxy_pass http://tilezilla_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 128k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }
}
