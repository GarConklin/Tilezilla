services:
  web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    # Web does not require MySQL for static JSON gameplay; env ready when account API lands.
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    # environment:
    #   MYSQL_HOST: mysql
    #   MYSQL_PORT: 3306
    #   MYSQL_DATABASE: ${MYSQL_DATABASE:-tilegame}
    #   MYSQL_USER: ${MYSQL_USER:-tilegame}
    #   MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tilegame_dev}

  mysql:
    image: mysql:8.4
    container_name: garz-puzzle-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tilegame}
      MYSQL_USER: ${MYSQL_USER:-tilegame}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tilegame_dev}
    volumes:
      - tilegame_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  tilegame_mysql_data:
