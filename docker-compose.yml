# Tilezilla — default dev stack (game + auth + shared MySQL).
# Prefer .\scripts\start-remote-test.ps1 for LAN testing with nginx gateway on 8080.
#
# MySQL data persists in Docker volume tilezilla_shared_mysql_data (survives restarts).
# Run .\scripts\ensure-shared-mysql-volume.ps1 before first boot if upgrading from older volumes.

name: tilezilla

services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      AUTH_UPSTREAM: "http://php-auth"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      php-auth:
        condition: service_started

  php-auth:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.remote
    container_name: tilezilla_auth
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./auth/config:/var/www/html/config
      - ./auth/api:/var/www/html/api
      - ./auth/src:/var/www/html/src
      - ./auth/public:/var/www/html/public
    environment:
      DB_HOST: mysql
      DB_USER: ${MYSQL_USER:-tilegame}
      DB_PASS: ${MYSQL_PASSWORD:-tilegame_dev}
      DB_NAME: WordsOnline
      GAME_DB_HOST: mysql
      GAME_DB_USER: ${MYSQL_USER:-tilegame}
      GAME_DB_PASS: ${MYSQL_PASSWORD:-tilegame_dev}
      GAME_DB_NAME: ${MYSQL_DATABASE:-tilegame}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      APP_NAME: Tilezilla
      APP_FROM_EMAIL: ${APP_FROM_EMAIL:-words@skifflakegames.com}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-gar@hotmail.ca}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: garz-puzzle-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tilegame}
      MYSQL_USER: ${MYSQL_USER:-tilegame}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tilegame_dev}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  mysql_data:
    name: tilezilla_shared_mysql_data
    external: true
